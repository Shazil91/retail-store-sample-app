name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '!**/*.md'

  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read


jobs:

  # -----------------------------
  # 1. Detect Changes
  # -----------------------------
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: set-matrix
        run: |
          set -euo pipefail

          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="origin/main"
          fi

          git fetch origin main --depth=2 || true

          FILES=$(git diff --name-only $BASE ${{ github.sha }} || true)

          if [ -z "$FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
            exit 0
          fi

          MATRIX=$(echo "$FILES" | python3 ci/ci_tools.py detect)

          COUNT=$(echo "$MATRIX" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('service',[])))")

          if [ "$COUNT" -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT


  # -----------------------------
  # 2. Build & Push Docker Images
  # -----------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute values
        id: vars
        run: |
          TAG=$(python3 ci/ci_tools.py tag "${{ github.sha }}")

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          URI=$(python3 ci/ci_tools.py ecr \
            "$ACCOUNT_ID" "${{ vars.AWS_REGION }}" "${{ matrix.service }}")

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "uri=$URI" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          file: src/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.vars.outputs.uri }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.uri }}:latest


  # -----------------------------
  # 3. Update Helm (GitOps)
  # -----------------------------
  update-helm-values:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: github.event_name != 'pull_request' && needs.detect-changes.outputs.has_changes == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Patch Helm values
        run: |
          set -euo pipefail

          MATRIX='${{ needs.detect-changes.outputs.matrix }}'

          SERVICES=$(echo "$MATRIX" | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin).get('service',[])))")

          TAG=$(python3 ci/ci_tools.py tag "${{ github.sha }}")

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          for S in $SERVICES; do
            URI=$(python3 ci/ci_tools.py ecr "$ACCOUNT_ID" "${{ vars.AWS_REGION }}" "$S")

            python3 ci/ci_tools.py patch \
              "src/$S/chart/values.yaml" "$TAG" "$URI"
          done

      - name: Commit changes
        run: |
          git add .
          git diff --cached --quiet && exit 0 || git commit -m "chore: update image tags [skip ci]"

      - name: Push changes
        run: git push origin main