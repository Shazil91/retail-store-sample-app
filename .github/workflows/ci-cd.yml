name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure scripts are executable
        run: chmod +x scripts/ci/helpers.sh

      - name: Detect changed services
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA=""
          HEAD_SHA="${{ github.sha }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}"

            BASE_SHA=$(git merge-base HEAD "origin/${{ github.base_ref }}")
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD)

          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")

          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi

          - name: Detect changed services
            id: set-matrix
            run: |
              set -euo pipefail

              FILES=$(git diff --name-only HEAD~1 HEAD)

              MATRIX=$(echo "$FILES" | python3 ci/ci_tools.py detect)

              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "$MATRIX"

      - name: Skipped services summary
        run: |
          MATRIX='${{ steps.set-matrix.outputs.matrix }}'

          IN_MATRIX=$(echo "$MATRIX" | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin).get('service',[])))")

          for S in cart catalog orders; do
            echo "$IN_MATRIX" | grep -qw "$S" || \
            bash scripts/ci/helpers.sh write_job_summary "$S" "-" "-" "skipped"
          done


  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '{"service":[]}' && needs.detect-changes.outputs.matrix != ''

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: AWS login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute tags
        id: vars
        run: |
          IMAGE_TAG=$(python3 ci/ci_tools.py tag "${{ github.sha }}")
          ACCOUNT_ID=$(echo "${{ steps.ecr.outputs.registry }}" | cut -d'.' -f1)

          ECR_URI=$(python3 ci/ci_tools.py ecr "$ACCOUNT_ID" "${{ vars.AWS_REGION }}" "$SERVICE")
            "$ACCOUNT_ID" "${{ vars.AWS_REGION }}" "${{ matrix.service }}")

          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "uri=$ECR_URI" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          file: src/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.vars.outputs.uri }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.uri }}:latest


  update-helm-values:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: github.event_name != 'pull_request' && needs.detect-changes.outputs.matrix != '{"service":[]}' && needs.detect-changes.outputs.matrix != ''

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: AWS login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Patch Helm values
        run: |
          set -euo pipefail

          MATRIX='${{ needs.detect-changes.outputs.matrix }}'

          SERVICES=$(echo "$MATRIX" | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin).get('service',[])))")

          IMAGE_TAG=$(python3 ci/ci_tools.py tag "${{ github.sha }}")
          ACCOUNT_ID=$(echo "${{ steps.ecr.outputs.registry }}" | cut -d'.' -f1)

          for S in $SERVICES; do
            ECR_URI=$(bash scripts/ci/helpers.sh build_ecr_uri \
              "$ACCOUNT_ID" "${{ vars.AWS_REGION }}" "$S")

            python3 ci/ci_tools.py patch ...
              "src/$S/chart/values.yaml" "$IMAGE_TAG" "$ECR_URI"
          done

      - name: Commit changes
        run: |
          git add .
          git commit -m "chore: update helm values [skip ci]" || exit 0

      - name: Push changes
        run: git push origin main
