name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths: ['src/**']
  pull_request:
    branches: [main]

permissions:
  contents: write      # Required for Helm update job to push commits
  id-token: write      # Required for OIDC-based AWS authentication

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cart:     ${{ steps.filter.outputs.cart }}
      catalog:  ${{ steps.filter.outputs.catalog }}
      orders:   ${{ steps.filter.outputs.orders }}
      checkout: ${{ steps.filter.outputs.checkout }}
      ui:       ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cart:
              - 'src/cart/**'
            catalog:
              - 'src/catalog/**'
            orders:
              - 'src/orders/**'
            checkout:
              - 'src/checkout/**'
            ui:
              - 'src/ui/**'

  build-cart:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.cart == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push cart image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          docker build -t "$REGISTRY/retail-store-sample-cart:$SHORT_TAG" \
                       -t "$REGISTRY/retail-store-sample-cart:latest" \
                       src/cart/
          docker push "$REGISTRY/retail-store-sample-cart:$SHORT_TAG"
          docker push "$REGISTRY/retail-store-sample-cart:latest"

  build-catalog:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.catalog == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push catalog image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          docker build -t "$REGISTRY/retail-store-sample-catalog:$SHORT_TAG" \
                       -t "$REGISTRY/retail-store-sample-catalog:latest" \
                       src/catalog/
          docker push "$REGISTRY/retail-store-sample-catalog:$SHORT_TAG"
          docker push "$REGISTRY/retail-store-sample-catalog:latest"

  build-orders:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.orders == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push orders image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          docker build -t "$REGISTRY/retail-store-sample-orders:$SHORT_TAG" \
                       -t "$REGISTRY/retail-store-sample-orders:latest" \
                       src/orders/
          docker push "$REGISTRY/retail-store-sample-orders:$SHORT_TAG"
          docker push "$REGISTRY/retail-store-sample-orders:latest"

  build-checkout:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.checkout == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push checkout image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          docker build -t "$REGISTRY/retail-store-sample-checkout:$SHORT_TAG" \
                       -t "$REGISTRY/retail-store-sample-checkout:latest" \
                       src/checkout/
          docker push "$REGISTRY/retail-store-sample-checkout:$SHORT_TAG"
          docker push "$REGISTRY/retail-store-sample-checkout:latest"

  build-ui:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ui image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          docker build -t "$REGISTRY/retail-store-sample-ui:$SHORT_TAG" \
                       -t "$REGISTRY/retail-store-sample-ui:latest" \
                       src/ui/
          docker push "$REGISTRY/retail-store-sample-ui:$SHORT_TAG"
          docker push "$REGISTRY/retail-store-sample-ui:latest"

  update-helm-cart:
    runs-on: ubuntu-latest
    needs: build-cart
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Helm values for cart
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          sed -i "s|  tag:.*|  tag: \"${SHORT_TAG}\"|" src/cart/chart/values.yaml
          sed -i "s|  repository:.*|  repository: \"${REGISTRY}/retail-store-sample-cart\"|" src/cart/chart/values.yaml

      - name: Verify values.yaml was modified
        run: |
          if git diff --exit-code src/cart/chart/values.yaml; then
            echo "ERROR: No changes detected in src/cart/chart/values.yaml — sed substitution may have failed"
            exit 1
          fi

      - name: Commit and push Helm chart update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "ci: update cart image tag to ${SHORT_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin main

  update-helm-catalog:
    runs-on: ubuntu-latest
    needs: build-catalog
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Helm values for catalog
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          sed -i "s|  tag:.*|  tag: \"${SHORT_TAG}\"|" src/catalog/chart/values.yaml
          sed -i "s|  repository:.*|  repository: \"${REGISTRY}/retail-store-sample-catalog\"|" src/catalog/chart/values.yaml

      - name: Verify values.yaml was modified
        run: |
          if git diff --exit-code src/catalog/chart/values.yaml; then
            echo "ERROR: No changes detected in src/catalog/chart/values.yaml — sed substitution may have failed"
            exit 1
          fi

      - name: Commit and push Helm chart update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "ci: update catalog image tag to ${SHORT_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin main

  update-helm-orders:
    runs-on: ubuntu-latest
    needs: build-orders
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Helm values for orders
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          sed -i "s|  tag:.*|  tag: \"${SHORT_TAG}\"|" src/orders/chart/values.yaml
          sed -i "s|  repository:.*|  repository: \"${REGISTRY}/retail-store-sample-orders\"|" src/orders/chart/values.yaml

      - name: Verify values.yaml was modified
        run: |
          if git diff --exit-code src/orders/chart/values.yaml; then
            echo "ERROR: No changes detected in src/orders/chart/values.yaml — sed substitution may have failed"
            exit 1
          fi

      - name: Commit and push Helm chart update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "ci: update orders image tag to ${SHORT_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin main

  update-helm-checkout:
    runs-on: ubuntu-latest
    needs: build-checkout
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Helm values for checkout
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          sed -i "s|  tag:.*|  tag: \"${SHORT_TAG}\"|" src/checkout/chart/values.yaml
          sed -i "s|  repository:.*|  repository: \"${REGISTRY}/retail-store-sample-checkout\"|" src/checkout/chart/values.yaml

      - name: Verify values.yaml was modified
        run: |
          if git diff --exit-code src/checkout/chart/values.yaml; then
            echo "ERROR: No changes detected in src/checkout/chart/values.yaml — sed substitution may have failed"
            exit 1
          fi

      - name: Commit and push Helm chart update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "ci: update checkout image tag to ${SHORT_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin main

  update-helm-ui:
    runs-on: ubuntu-latest
    needs: build-ui
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::626311399924:role/github-actions-ecr-push-dev
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Helm values for ui
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          sed -i "s|  tag:.*|  tag: \"${SHORT_TAG}\"|" src/ui/chart/values.yaml
          sed -i "s|  repository:.*|  repository: \"${REGISTRY}/retail-store-sample-ui\"|" src/ui/chart/values.yaml

      - name: Verify values.yaml was modified
        run: |
          if git diff --exit-code src/ui/chart/values.yaml; then
            echo "ERROR: No changes detected in src/ui/chart/values.yaml — sed substitution may have failed"
            exit 1
          fi

      - name: Commit and push Helm chart update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "ci: update ui image tag to ${SHORT_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin main
